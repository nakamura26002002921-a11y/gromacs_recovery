gromacs:
  force_field: "amber99sb"
  water_model: "spc"
agent:
  max_attempts: 10
  log_dir: "logs"
  keep_work_dir: true
  output_dir: "results"
rfdiffusion:
  script_path: "/path/to/RFdiffusion/scripts/run_inference.py"
  model_directory_path: "/path/to/RFdiffusion/models"
  min_residues_for_rfdiffusion: 6   # これ以上の欠損はRFdiffusionへ、1〜5残基はPDBfixerへ
  num_designs: 1
  timeout_sec: 1800
  pdb_id: null                          # 例: "6XYZ"。
  reassign_sequence_from_fasta: true    # RCSB FASTAで新規生成残基の配列を再割り当てするか
  fasta_cache_dir: "cache/fasta"        # ダウンロードしたFASTAのキャッシュ先(任意)
  truncation:
    # 巨大な複合体をそのままRFdiffusionに渡すとO(N^2)でGPUメモリを消費し
    # CUDA OOMになるため、欠損部近傍だけを切り出して渡す。
    anchor_padding_residues: 10       # 欠損区間の前後、何残基分をアンカーとして使うか
    context_radius_angstrom: 15.0     # アンカーから何Å以内の残基を近傍として残すか
